<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CBT FK UHO - Terminologi & Musculoskeletal</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>CBT FK UHO</h1>
    <p class="subtitle">
      Latihan Terminologi Kedokteran • Anatomi • Musculoskeletal
    </p>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="container">

    <!-- PROGRESS SECTION -->
    <section class="progress-section">

      <div class="progress-info">
        <span id="questionCounter">Soal: 0 / 0</span>
        <span id="scoreDisplay">Skor: 0</span>
        <span id="difficultyDisplay">Level: -</span>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

    </section>

    <!-- QUIZ CARD -->
    <section class="quiz-card">

      <!-- QUESTION -->
      <div class="question-box">
        <h2 id="questionText">Loading soal...</h2>
      </div>

      <!-- OPTIONS -->
      <div id="optionsContainer" class="options-container">
        <!-- JS inject options here -->
      </div>

      <!-- FEEDBACK / EXPLANATION -->
      <div id="feedbackBox" class="feedback-box hidden">

        <p id="answerStatus"></p>

        <div class="explanation-title">
          Penjelasan:
        </div>

        <p id="explanationText"></p>
      </div>

      <!-- CONTROLS -->
      <div class="controls">

        <button id="nextBtn" onclick="nextQuestion()">
          Next
        </button>

        <button id="restartBtn" onclick="restartQuiz()">
          Restart
        </button>

      </div>

    </section>

  </main>

  <!-- RESULT SCREEN -->
  <section id="resultScreen" class="result-screen hidden">

    <h2>Hasil CBT</h2>

    <div class="result-box">
      <p id="finalScore"></p>
      <p id="finalLevel"></p>
    </div>

    <button onclick="restartQuiz()">Ulangi CBT</button>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>CBT FK UHO • Learning System Prototype</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
